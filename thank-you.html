<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - WebPage Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: #1f1f1f;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Success Animation */
        .check-circle {
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes scaleUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .check-icon {
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            animation: drawCheck 0.6s 0.4s ease-out forwards;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body class="h-screen w-full flex items-center justify-center relative">

    <!-- Background Gradient -->
    <div class="absolute inset-0 overflow-hidden -z-10">
        <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[100px]"></div>
    </div>

    <!-- Success Card -->
    <div
        class="glass-card p-12 rounded-3xl text-center max-w-lg w-full mx-4 border-t border-white/10 relative overflow-hidden">

        <!-- Glow Effect -->
        <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-blue-500/50 to-transparent">
        </div>

        <!-- Checkmark -->
        <div
            class="w-24 h-24 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-8 check-circle ring-1 ring-green-500/20">
            <svg class="w-10 h-10 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" class="check-icon"></polyline>
            </svg>
        </div>

        <h1 class="text-3xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
            Request Received!</h1>

        <p class="text-gray-400 mb-8 leading-relaxed">
            Thanks <span id="userName" class="text-white font-semibold">there</span>! <br>
            We've received your details. Our team will review your project and get back to you shortly.
        </p>

        <div class="flex flex-col gap-3">
            <a href="index.html"
                class="w-full py-4 rounded-xl bg-gradient-to-br from-blue-600 to-blue-800 hover:scale-[1.02] text-white font-bold transition shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 group">
                Back to Home
                <i class="fas fa-arrow-right group-hover:translate-x-1 transition"></i>
            </a>
        </div>
    </div>

    <script>
        // Personalization
        const userName = localStorage.getItem('contact_name');
        if (userName) {
            document.getElementById('userName').textContent = userName.split(' ')[0]; // First name only
        }

        // Simulate "Submission to Dashboard" (Logging)
        const pendingData = localStorage.getItem('contact_data');
        if (pendingData) {
            console.log("Submitting data to dashboard system:", JSON.parse(pendingData));
            // In a real app, this would be a POST request. 
            // Here we assume localStorage IS the database for the static dashboard to read.
        }
    </script>
</body>

</html>
